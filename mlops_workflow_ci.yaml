name: MLOps Workflow (Repo B)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  # ============================================================
  # JOB: CI MLflow & DockerHub
  # ============================================================
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.12.7
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.7'

      - name: Install Dependencies
        run: |
          pip install mlflow dagshub kaggle pandas numpy scikit-learn matplotlib seaborn

      # Karena Repo B tetap memiliki folder preprocessing, kita bisa mengunduh datanya via script yang sama
      - name: Download Dataset
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          python preprocessing/automate_Fierda.py

      - name: Run Training via MLflow Project
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.DAGSHUB_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
          DAGSHUB_OWNER: Fierda
          DAGSHUB_REPO: MLOps_Fraud_Detection
        run: |
          mlflow run . --env-manager=local

      - name: Save Artifacts to Repository
        run: |
          mkdir -p artifacts
          cp -r mlruns artifacts/ 2>/dev/null || echo "mlruns managed remotely"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add artifacts/ || true
          git diff --cached --quiet || git commit -m "chore: save training artifacts [CI]"
          git push || true

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Docker Image
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.DAGSHUB_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          # Build Docker image from registered model
          # Change "models:/FraudModel/1" to match your model name & version
          mlflow models build-docker \
            -m "models:/FraudModel/1" \
            -n "${{ secrets.DOCKER_USERNAME }}/fraud-api:latest"
          docker push "${{ secrets.DOCKER_USERNAME }}/fraud-api:latest"
